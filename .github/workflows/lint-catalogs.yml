name: Lint catalogs

on:
  push:
    branches: [main]
    paths:
      - 'data/**.json'
      - 'scripts/lint-catalogs.py'
  pull_request:
    paths:
      - 'data/**.json'
      - 'scripts/lint-catalogs.py'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run catalog lint
        run: python3 scripts/lint-catalogs.py
