name: Auto-rebuild app.min.js + bump SW cache

# When app.js (or any other cached asset) changes on a push to main, the
# minified bundle is rebuilt and the service-worker cache name is bumped
# in a single bot commit. Removes both the "rebuild app.min.js" step and
# the "bump SW cache" step from the manual release flow.
#
# Loop prevention: github-actions[bot]'s own commits skip this workflow
# via the actor check, and app.min.js itself is not in the trigger paths
# so the bot's commit doesn't re-fire the workflow.

on:
  push:
    branches: [main]
    paths:
      - 'app.js'
      - 'styles.css'
      - 'index.html'
      - 'manifest.json'
      - 'data/**.json'
      - 'icons/**'

permissions:
  contents: write

concurrency:
  group: sw-cache-bump
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect what changed in this push
        id: changed
        run: |
          set -eu
          diff=$(git diff --name-only HEAD~1 HEAD || true)
          echo "$diff" | grep -q '^app\.js$'           && echo "app_js=true"  >> "$GITHUB_OUTPUT" || echo "app_js=false" >> "$GITHUB_OUTPUT"
          echo "$diff" | grep -q '^service-worker\.js$' && echo "sw=true"     >> "$GITHUB_OUTPUT" || echo "sw=false"     >> "$GITHUB_OUTPUT"

      - name: Set up Node
        if: steps.changed.outputs.app_js == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install esbuild
        if: steps.changed.outputs.app_js == 'true'
        run: npm install --silent --no-audit --no-fund

      - name: Rebuild app.min.js
        if: steps.changed.outputs.app_js == 'true'
        run: |
          set -eu
          npx esbuild app.js --minify --target=es2020 --outfile=app.min.js --legal-comments=none
          # Capture whether the rebuild actually produced a different file —
          # rebuilds are deterministic, so if the user rebuilt locally before
          # pushing the output would be byte-identical and we have nothing
          # to commit for app.min.js.
          if git diff --quiet app.min.js; then
            echo "min_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "min_changed=true" >> "$GITHUB_OUTPUT"
          fi
        id: rebuild

      - name: Bump SW cache version
        if: steps.changed.outputs.sw == 'false'
        id: bump
        run: |
          set -eu
          # v7.0.0 renamed the cache namespace from `scifi-tracker-vN` to
          # `cinemath-vN`. Fail loudly if neither prefix is present — better
          # than silently no-opping the way it did between v7.0.0 and v7.5.0.
          # The `|| true` keeps grep's no-match (exit 1) from tripping the
          # default `set -eo pipefail` shell before the empty-result check.
          current=$(grep -oE "(cinemath|scifi-tracker)-v[0-9]+" service-worker.js | head -1 || true)
          if [ -z "$current" ]; then
            echo "::error::No cache prefix found in service-worker.js (expected cinemath-vN or scifi-tracker-vN)"
            exit 1
          fi
          prefix="${current%-v*}-v"
          n="${current#${prefix}}"
          next=$((n + 1))
          sed -i "s/${prefix}${n}/${prefix}${next}/" service-worker.js
          echo "Bumped ${prefix}${n} -> ${prefix}${next}"
          echo "next=${next}" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        run: |
          set -eu
          # Stage whichever files actually changed
          if [ "${{ steps.rebuild.outputs.min_changed }}" = "true" ]; then
            git add app.min.js
          fi
          if [ "${{ steps.changed.outputs.sw }}" = "false" ]; then
            git add service-worker.js
          fi
          # If nothing was staged, exit cleanly
          if git diff --cached --quiet; then
            echo "Nothing to commit — minified bundle and SW cache already in sync."
            exit 0
          fi
          # Compose a commit message that names what actually changed
          msg="chore(sw):"
          if [ "${{ steps.rebuild.outputs.min_changed }}" = "true" ] && [ "${{ steps.changed.outputs.sw }}" = "false" ]; then
            msg="$msg rebuild app.min.js + auto-bump cache to v${{ steps.bump.outputs.next }}"
          elif [ "${{ steps.rebuild.outputs.min_changed }}" = "true" ]; then
            msg="$msg rebuild app.min.js (SW cache untouched)"
          else
            msg="$msg auto-bump cache to v${{ steps.bump.outputs.next }}"
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m "$msg"
          git push
