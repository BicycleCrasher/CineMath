name: Bundle size check

# Runs esbuild on app.js and reports the minified + gzipped size as a PR
# comment. Does NOT commit minified output — keeps the repo clean.
# To ship a minified production build: run `npm run build:min` locally,
# rename app.min.js -> app.js (or update index.html and service-worker.js
# to load app.min.js), commit, push.

on:
  pull_request:
    paths:
      - 'app.js'

permissions:
  pull-requests: write

jobs:
  size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --silent --no-audit --no-fund

      - name: Build minified
        run: npx esbuild app.js --minify --target=es2020 --outfile=app.min.js --legal-comments=none

      - name: Compute sizes
        id: sizes
        run: |
          src=$(stat -c%s app.js)
          minified=$(stat -c%s app.min.js)
          gzipped=$(gzip -c app.min.js | wc -c)
          echo "src=${src}" >> "$GITHUB_OUTPUT"
          echo "minified=${minified}" >> "$GITHUB_OUTPUT"
          echo "gzipped=${gzipped}" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const src = ${{ steps.sizes.outputs.src }};
            const min = ${{ steps.sizes.outputs.minified }};
            const gz = ${{ steps.sizes.outputs.gzipped }};
            const kb = (n) => (n / 1024).toFixed(1) + ' KB';
            const body = [
              '**Bundle size — `app.js`**',
              '',
              `| Variant | Size |`,
              `|---------|------|`,
              `| Source | ${kb(src)} |`,
              `| Minified | ${kb(min)} (${((1 - min / src) * 100).toFixed(0)}% smaller) |`,
              `| Minified + gzipped | ${kb(gz)} |`,
              '',
              '_Production currently serves the source `app.js`. Run `npm run build:min` locally if you want to ship the minified bundle._'
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
