# Wrangler config for watchtrack-plex.
#
# Used by the deploy-worker.yml GitHub Action. The CLI's `wrangler deploy`
# reads this file, packages worker.js, and replaces both the deployed code
# and the bindings on Cloudflare. Means: bindings declared here OVERWRITE
# whatever you've configured in the dashboard. Keep this file in sync with
# the actual KV namespaces Cloudflare assigned.
#
# To find the IDs: Cloudflare dashboard → Workers & Pages → KV → click the
# namespace name → the page header shows "Namespace ID: <32-char-hex>".

name = "watchtrack-plex"
main = "worker.js"
compatibility_date = "2024-09-01"

# Daily cron trigger that fires runAlertsCheck (see worker.js scheduled handler).
# 13:00 UTC == 8:00 AM Central in winter / 7:00 AM Central in summer.
[triggers]
crons = ["0 13 * * *"]

# === KV bindings ===
# Variable name on the left (what the Worker code references via env.X);
# the `id` is the Cloudflare-assigned namespace ID. PASTE YOUR IDS BELOW
# before the first deploy or the live bindings get blown away.

[[kv_namespaces]]
binding = "EVENTS"
id = "61b4b2fd72424c17aa257129af9c717e"

[[kv_namespaces]]
binding = "CONFIG"
id = "6d66838d49764c44a94d397e1118a96c"

[[kv_namespaces]]
binding = "VIEWED"
id = "1b18c52425a14b0a8125e70f75428937"

[[kv_namespaces]]
binding = "METADATA"
id = "52e68496c4c34e0a8bfb1a874f9a2a60"

[[kv_namespaces]]
binding = "PROMOTIONS"
id = "68d1209669964e898213867ff8ad7de0"

# The Cloudflare namespace is named WATCHTRACK_SYNC; the Worker code
# references it as env.SYNC_KV (the binding name). Those don't need
# to match — only the binding name has to match the code.
[[kv_namespaces]]
binding = "SYNC_KV"
id = "7f03e78c6a90403c9330474190bf2abd"

[[kv_namespaces]]
binding = "ALERTS"
id = "7fc3279a95e247398db43fa3bd65733b"

# v9.0.0 — Multi-user identities + devices.
# Holds:
#   admin                           singleton { userId }
#   device:{deviceId}               { userId, kind, name, userAgent, createdAt, lastSeen, authTokenHash }
#   invite:{inviteCode}             { createdBy, createdAt, expiresAt, consumed, consumedBy, plexEnabled, suggestedDisplayName }
#   reconnect:{reconnectCode}       { targetUserId, createdAt, expiresAt, consumed }
#   pair:{pairSessionId}            { createdAt, expiresAt, consumed, fulfillment, ownedByUserId? }
#   ratelimit:{userId}:{bucket}:{m} per-user sliding-window counter
# Lincoln must create this namespace via the Cloudflare dashboard
# (Workers & Pages → KV → Create namespace, name it
# `watchtrack-users` or similar) and paste the 32-char hex namespace ID
# below before the first v9.0.0 deploy.
[[kv_namespaces]]
binding = "USERS"
id = "REPLACE_WITH_USERS_NAMESPACE_ID"

# === R2 buckets (v5.10) ===
# Daily compressed state snapshots. Free tier: 10 GB storage + 1M
# Class A operations / month — wildly over-provisioned for one user.
[[r2_buckets]]
binding = "BACKUPS"
bucket_name = "watchtrack-backups"

# === D1 databases (v5.11) ===
# Plex viewing history, migrated from the VIEWED KV namespace. SQL
# unlocks fast Period in Review queries, time-windowed aggregations,
# and "most rewatched" / "longest streak" analytics that KV can't do.
# During the transition, /webhook and /viewed/ingest dual-write to
# both VIEWED KV and D1; reads come from D1.
[[d1_databases]]
binding = "D1_VIEWED"
database_name = "watchtrack-viewed"
database_id = "2d67ee44-2896-4d32-8734-b1e6fc4f8021"

# === Workers AI (v5.12) ===
# Inference binding for the natural-language chat. No ID required —
# the platform-managed AI gateway is just attached by name.
[ai]
binding = "AI"

# === Secrets (v7.4.0, expanded v8.0.0) ===
# Declares the encrypted secrets the Worker depends on. The secret VALUES
# are never stored here — only the names. They're set via the Cloudflare
# dashboard (Workers & Pages → watchtrack-plex → Settings → Variables and
# Secrets, type: Secret). `wrangler deploy` validates that every name in
# `secrets.required` is actually configured on the Worker before deploying,
# so a missing key fails the CI deploy with a clear error instead of
# silently shipping a Worker that 500s on first /palate/predict-tags hit.
#
# v8.0.0 added the credential-vault secrets:
#
#   PLEX_TOKEN          — Plex auth token (was in CONFIG KV pre-v8; now a
#                         real Worker secret, set by /bootstrap/credentials).
#   TRAKT_CLIENT_ID     — Trakt OAuth app client ID.
#   TRAKT_CLIENT_SECRET — Trakt OAuth app client secret.
#   ADMIN_API_TOKEN     — Cloudflare API token with `Workers Scripts:Edit`
#                         permission. Used by /bootstrap/credentials to
#                         PUT the three secrets above via the CF API.
#                         Set manually via dashboard once, before first
#                         promote. Safe to delete after successful promote.
#   CF_ACCOUNT_ID       — Cloudflare account ID (UUID). Needed for the
#                         CF API endpoint URL. Set manually via dashboard.
# ADMIN_API_TOKEN and CF_ACCOUNT_ID are NOT listed here because they are
# ephemeral — the deploy instructions say to delete them after first promote.
# Listing them as required would break CI after deletion.
# PLEX_TOKEN / TRAKT_CLIENT_* are not listed either because they don't exist
# on a fresh deploy before the first promote; the Worker guards internally.
# v9.0.0 added TRAKT_ENCRYPTION_KEY: 32 random bytes, base64-encoded.
# Used by the Worker's AES-GCM helpers to encrypt Trakt access/refresh
# tokens at rest in D1. Lincoln must set this once via the Cloudflare
# dashboard (Workers → watchtrack-plex → Settings → Variables and
# Secrets → Secret), value generated by:
#     openssl rand -base64 32
# Rotation procedure documented in
# docs/multi-user-rollout.md once that file lands.
[secrets]
required = [
  "ANTHROPIC_API_KEY",
  "TRAKT_ENCRYPTION_KEY",
]

# === Workers observability ===
# Enable full log capture so console.log lines from the Worker show up
# in the Cloudflare → Logs tab. The dashboard sometimes suggests
# `enabled = false, invocation_logs = true` — that captures request
# counters only, no log content. We want full observability for
# diagnosis, especially during the chat tuning phase.
[observability]
enabled = true
head_sampling_rate = 1
