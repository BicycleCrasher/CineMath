<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="CinéMath">
  <title>CinéMath — your palate, computed</title>
  <defs>
    <linearGradient id="cmGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f0cb74"/>
      <stop offset="55%"  stop-color="#c8a35a"/>
      <stop offset="100%" stop-color="#8a7340"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="#0e0d0b"/>
  <!-- top filmstrip -->
  <rect x="0" y="60" width="512" height="40" fill="#0a0908"/>
  <g fill="url(#cmGold)" opacity="0.85">
    <rect x="14"  y="72" width="22" height="16" rx="2"/>
    <rect x="56"  y="72" width="22" height="16" rx="2"/>
    <rect x="98"  y="72" width="22" height="16" rx="2"/>
    <rect x="140" y="72" width="22" height="16" rx="2"/>
    <rect x="182" y="72" width="22" height="16" rx="2"/>
    <rect x="224" y="72" width="22" height="16" rx="2"/>
    <rect x="266" y="72" width="22" height="16" rx="2"/>
    <rect x="308" y="72" width="22" height="16" rx="2"/>
    <rect x="350" y="72" width="22" height="16" rx="2"/>
    <rect x="392" y="72" width="22" height="16" rx="2"/>
    <rect x="434" y="72" width="22" height="16" rx="2"/>
    <rect x="476" y="72" width="22" height="16" rx="2"/>
  </g>
  <!-- bottom filmstrip -->
  <rect x="0" y="412" width="512" height="40" fill="#0a0908"/>
  <g fill="url(#cmGold)" opacity="0.85">
    <rect x="14"  y="424" width="22" height="16" rx="2"/>
    <rect x="56"  y="424" width="22" height="16" rx="2"/>
    <rect x="98"  y="424" width="22" height="16" rx="2"/>
    <rect x="140" y="424" width="22" height="16" rx="2"/>
    <rect x="182" y="424" width="22" height="16" rx="2"/>
    <rect x="224" y="424" width="22" height="16" rx="2"/>
    <rect x="266" y="424" width="22" height="16" rx="2"/>
    <rect x="308" y="424" width="22" height="16" rx="2"/>
    <rect x="350" y="424" width="22" height="16" rx="2"/>
    <rect x="392" y="424" width="22" height="16" rx="2"/>
    <rect x="434" y="424" width="22" height="16" rx="2"/>
    <rect x="476" y="424" width="22" height="16" rx="2"/>
  </g>
  <!-- Wordmark: calligraphic Ciné + geometric Math -->
  <text x="180" y="280"
        font-family="'Cine Script','Great Vibes','Snell Roundhand','Edwardian Script ITC','Apple Chancery','Brush Script MT',cursive"
        font-style="italic" font-weight="400" font-size="180"
        fill="url(#cmGold)" text-anchor="end">Ciné</text>
  <text x="190" y="280"
        font-family="'Futura','Avenir Next','Avenir','Century Gothic','Helvetica Neue',sans-serif"
        font-weight="300" font-size="130"
        fill="#e8e4d8" text-anchor="start" letter-spacing="4">Math</text>
</svg>
